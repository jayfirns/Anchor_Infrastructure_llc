<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Anchor Infrastructure{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <header class="site-header">
        <div class="container-wide">
            <a href="/" class="logo">Anchor <span>Infrastructure</span></a>
        </div>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        <div class="container">
            Anchor Infrastructure &mdash; Sovereign infrastructure for small organizations.
        </div>
    </footer>

    {% block scripts %}{% endblock %}
</body>
</html>
